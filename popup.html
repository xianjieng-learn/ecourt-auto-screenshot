<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid #333;
    }
    .header span { font-size: 20px; }
    .header h1 { font-size: 14px; font-weight: 600; color: #fff; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      transition: background 0.3s;
    }
    .dot.on { background: #4CAF50; box-shadow: 0 0 6px #4CAF50; }
    .dot.off { background: #f44336; box-shadow: 0 0 6px #f44336; }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .toggle-label { font-size: 13px; }
    .switch {
      position: relative;
      width: 42px; height: 22px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #555;
      border-radius: 22px;
      transition: 0.3s;
    }
    .slider::before {
      content: '';
      position: absolute;
      height: 16px; width: 16px;
      left: 3px; bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    input:checked + .slider { background: #4CAF50; }
    input:checked + .slider::before { transform: translateX(20px); }
    .btn {
      display: block;
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      margin-bottom: 6px;
    }
    .btn-primary {
      background: #0f3460;
      color: #e0e0e0;
    }
    .btn-primary:hover { background: #1a4a7a; }
    .btn-secondary {
      background: #2a2a3e;
      color: #aaa;
    }
    .btn-secondary:hover { background: #3a3a4e; }
    .info {
      font-size: 11px;
      color: #777;
      margin-top: 8px;
      line-height: 1.4;
    }
    .shortcut {
      display: inline-block;
      background: #333;
      padding: 1px 5px;
      border-radius: 3px;
      font-family: monospace;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span>📸</span>
    <h1>eCourt Auto Screenshot</h1>
  </div>

  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Active — watching for popups</span>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Auto Detect</span>
    <label class="switch">
      <input type="checkbox" id="toggleAuto" checked>
      <span class="slider"></span>
    </label>
  </div>

  <button class="btn btn-primary" id="btnManual">📸 Screenshot Sekarang</button>
  <button class="btn btn-secondary" id="btnScan">🔍 Scan Ulang Halaman</button>

  <div class="info">
    Shortcut: <span class="shortcut">Alt + S</span> untuk screenshot manual.
    <br>Screenshot otomatis ter-download ke folder Downloads.
  </div>

  <script src="popup.js"></script>
</body>
</html>
